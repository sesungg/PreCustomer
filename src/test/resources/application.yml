spring:
  application:
    name: precustomer-test
  datasource:
    url: jdbc:h2:mem:precustomer-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  thymeleaf:
    cache: false

app:
  ai:
    provider: mock
  persona:
    import-enabled: false
    sample-import-enabled: false
    import-path: ./data/personas.full.jsonl
    import-batch-size: 3000
    import-source: NEMOTRON
  pipeline:
    worker-enabled: false
    worker-poll-ms: 600000
    worker-initial-delay-ms: 3600000
  deepseek:
    base-url: https://api.deepseek.com
    model: deepseek-v4-flash
    api-key: ${DEEPSEEK_API_KEY:}
    temperature: 0.4
    max-tokens: 6000

---
spring:
  config:
    activate:
      on-profile: web
  main:
    web-application-type: servlet
app:
  pipeline:
    worker-enabled: false

---
spring:
  config:
    activate:
      on-profile: worker
  main:
    web-application-type: none
app:
  pipeline:
    worker-enabled: true
