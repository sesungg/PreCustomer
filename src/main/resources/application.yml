spring:
  application:
    name: precustomer
  profiles:
    default: local
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

#logging:
#  level:
#    org.thymeleaf: DEBUG
#    org.springframework.web.servlet: DEBUG

app:
  upload:
    dir: ./uploads
    allowed-types: image/webp,image/png,image/jpeg
  persona:
    import-enabled: false
    sample-import-enabled: false
    import-path: ./data/personas.full.jsonl
    import-batch-size: 3000
    import-source: NEMOTRON
  pipeline:
    scripts-dir: /Users/ssg/dev/datasets/scripts
    python-bin: python3
    db-host: localhost
    db-port: 5432
    db-name: precustomer
    db-user: postgres
    db-password: postgres
  deepseek:
    base-url: https://api.deepseek.com
    model: deepseek-v4-flash
    api-key: ${DEEPSEEK_API_KEY:}
    temperature: 0.4
    max-tokens: 6000

naver:
  shopping:
    client-id: ${NAVER_SHOPPING_CLIENT_ID:}
    client-secret: ${NAVER_SHOPPING_CLIENT_SECRET:}
    base-url: https://openapi.naver.com/v1/search/shop.json
    display-size: 100
    timeout-millis: 5000
    scoring-version: NAVER_SHOPPING_CANDIDATE_V1

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/precustomer}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  thymeleaf:
    cache: false

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:precustomer;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  thymeleaf:
    cache: false

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/precustomer}
    username: ${DATABASE_USERNAME:precustomer}
    password: ${DATABASE_PASSWORD:change-me}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

server:
  port: ${PORT:8080}
