<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'가상 고객 반응 | ' + ${reaction.segment_label}">가상 고객 반응 상세</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        :root {
            --blue:#2563eb; --slate:#1e293b; --gray:#64748b; --border:#e2e8f0;
            --surface:#f8fafc; --amber:#d97706; --green:#059669; --red:#dc2626;
            --violet:#7c3aed; --cyan:#0891b2; --orange:#ea580c;
        }
        .persona-detail { max-width:900px; margin:0 auto; font-family:'Pretendard','Inter',system-ui,-apple-system,sans-serif; color:var(--slate); }

        /* ── 상단 2열 카드 ── */
        .persona-header { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
        .card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:24px 28px; }
        .card h2 { font-size:1.05rem; font-weight:700; margin:0 0 16px; color:var(--slate); padding-bottom:10px; border-bottom:1px solid var(--border); }

        /* ── 프로필 그리드 ── */
        .profile-grid { display:grid; grid-template-columns:auto 1fr; gap:6px 16px; font-size:0.86rem; align-items:baseline; }
        .profile-grid dt { color:var(--gray); font-weight:500; white-space:nowrap; }
        .profile-grid dd { font-weight:600; color:var(--slate); margin:0; }
        .badge-decision { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.78rem; font-weight:700; }
        .dec-buy { background:#d1fae5; color:#065f46; }
        .dec-consider { background:#dbeafe; color:#1e40af; }
        .dec-hesitate { background:#fef3c7; color:#92400e; }
        .dec-notbuy { background:#fee2e2; color:#991b1b; }
        .dec-undecided { background:#f3f4f6; color:#374151; }
        .sent-pos { color:var(--green); font-weight:700; }
        .sent-neg { color:var(--red); font-weight:700; }
        .sent-mix { color:var(--amber); font-weight:700; }
        .sent-neu { color:var(--gray); font-weight:700; }

        /* ── 점수 그리드 (컬러바) ── */
        .score-list { display:flex; flex-direction:column; gap:10px; }
        .score-row { display:flex; align-items:center; gap:10px; font-size:0.85rem; }
        .score-row .score-lbl { width:80px; color:var(--gray); font-weight:500; flex-shrink:0; }
        .score-row .score-bar-bg { flex:1; height:8px; background:#e2e8f0; border-radius:4px; overflow:hidden; }
        .score-row .score-bar-fg { height:100%; border-radius:4px; transition:width .6s ease; }
        .score-row .score-val { width:30px; text-align:right; font-weight:700; font-size:0.9rem; flex-shrink:0; }

        /* ── 섹션 ── */
        .section { background:#fff; border:1px solid var(--border); border-radius:12px; padding:24px 28px; margin-bottom:14px; }
        .section h3 { font-size:0.95rem; font-weight:700; color:var(--slate); margin:0 0 14px; display:flex; align-items:center; gap:6px; }
        .section h3 .sec-icon { font-size:1rem; }
        .section p { font-size:0.9rem; line-height:1.85; color:#334155; margin:0; white-space:pre-line; }

        /* ── 대표 발언 ── */
        .quote-block { background:#f1f5f9; border-left:4px solid var(--blue); padding:16px 20px; border-radius:0 8px 8px 0; font-style:italic; font-size:0.93rem; line-height:1.8; color:#1e293b; }

        /* ── 태그 리스트 ── */
        .tag-list { display:flex; flex-wrap:wrap; gap:7px; }
        .tag { padding:4px 12px; border-radius:5px; font-size:0.82rem; font-weight:500; line-height:1.4; }
        .tag-green { background:#d1fae5; color:#065f46; }
        .tag-red   { background:#fee2e2; color:#991b1b; }
        .tag-amber { background:#fef3c7; color:#92400e; }
        .tag-blue  { background:#dbeafe; color:#1e40af; }
        .tag-gray  { background:#f3f4f6; color:#374151; }

        /* ── 개선사항 리스트 ── */
        .fix-list { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:8px; }
        .fix-list li { display:flex; gap:10px; font-size:0.88rem; line-height:1.7; color:#334155; }
        .fix-list li::before { content:'→'; color:var(--blue); font-weight:700; flex-shrink:0; margin-top:1px; }

        /* ── 반응형 ── */
        @media(max-width:700px) {
            .persona-header { grid-template-columns:1fr; }
            .card { padding:20px; }
            .section { padding:20px; }
        }
        @media print {
            .site-header { display:none; }
            .persona-detail { max-width:100%; }
            .section, .card { page-break-inside:avoid; box-shadow:none; border:1px solid #ddd; }
            @page { size:A4; margin:15mm 12mm; }
        }
    </style>
</head>
<body>
<header class="site-header">
    <a class="brand" href="/admin/orders">Admin</a>
    <a class="header-link" th:href="@{/admin/reports/{id}(id=${order.id})}">← 분석 결과로</a>
</header>

<main class="page persona-detail">

    <!-- ① 프로필 + 점수 카드 -->
    <div class="persona-header">
        <!-- 프로필 -->
        <div class="card">
            <h2 th:text="${reaction.segment_label}">가상 고객</h2>
            <dl class="profile-grid">
                <dt>연령</dt>
                <dd th:text="${reaction.age_group} + ' / ' + ${reaction.gender}"></dd>
                <dt>지역</dt>
                <dd th:text="${reaction.region}"></dd>
                <dt>직업</dt>
                <dd th:text="${reaction.occupation}"></dd>
                <dt>고객군</dt>
                <dd th:text="${reaction.selection_group}"></dd>
                <dt>전체 반응</dt>
                <dd>
                    <span th:classappend="${reaction.sentiment == 'POSITIVE' or reaction.sentiment == '긍정'} ? 'sent-pos' : (${reaction.sentiment == 'NEGATIVE' or reaction.sentiment == '부정'} ? 'sent-neg' : (${reaction.sentiment == 'MIXED' or reaction.sentiment == '복합'} ? 'sent-mix' : 'sent-neu'))"
                          th:text="${reaction.sentiment}"></span>
                </dd>
                <dt>구매 판단</dt>
                <dd>
                    <span class="badge-decision"
                          th:classappend="${reaction.decision_status == 'BUY' or reaction.decision_status == '구매 의향'} ? 'dec-buy' : (${reaction.decision_status == 'CONSIDER' or reaction.decision_status == '고려 중'} ? 'dec-consider' : (${reaction.decision_status == 'HESITATE' or reaction.decision_status == '망설임'} ? 'dec-hesitate' : (${reaction.decision_status == 'NOT_BUY' or reaction.decision_status == '구매 안 함'} ? 'dec-notbuy' : 'dec-undecided')))"
                          th:text="${reaction.decision_status}"></span>
                </dd>
            </dl>
        </div>

        <!-- 점수 (컬러바) -->
        <div class="card">
            <h2>점수 요약</h2>
            <div class="score-list">
                <div class="score-row">
                    <span class="score-lbl">구매 의향</span>
                    <div class="score-bar-bg"><div class="score-bar-fg" style="background:var(--blue)" th:style="'width:' + ${reaction.purchase_intent_score} + '%;background:var(--blue)'"></div></div>
                    <span class="score-val" style="color:var(--blue)" th:text="${reaction.purchase_intent_score}"></span>
                </div>
                <div class="score-row">
                    <span class="score-lbl">고객 적합도</span>
                    <div class="score-bar-bg"><div class="score-bar-fg" th:style="'width:' + ${reaction.target_fit_score} + '%;background:var(--violet)'"></div></div>
                    <span class="score-val" style="color:var(--violet)" th:text="${reaction.target_fit_score}"></span>
                </div>
                <div class="score-row">
                    <span class="score-lbl">가격 수용도</span>
                    <div class="score-bar-bg"><div class="score-bar-fg" th:style="'width:' + ${reaction.price_acceptance_score} + '%;background:var(--cyan)'"></div></div>
                    <span class="score-val" style="color:var(--cyan)" th:text="${reaction.price_acceptance_score}"></span>
                </div>
                <div class="score-row">
                    <span class="score-lbl">신뢰도</span>
                    <div class="score-bar-bg"><div class="score-bar-fg" th:style="'width:' + ${reaction.trust_score} + '%;background:var(--orange)'"></div></div>
                    <span class="score-val" style="color:var(--orange)" th:text="${reaction.trust_score}"></span>
                </div>
                <div class="score-row">
                    <span class="score-lbl">설명 이해도</span>
                    <div class="score-bar-bg"><div class="score-bar-fg" th:style="'width:' + ${reaction.detail_page_clarity_score} + '%;background:var(--green)'"></div></div>
                    <span class="score-val" style="color:var(--green)" th:text="${reaction.detail_page_clarity_score}"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- ② 대표 발언 -->
    <div class="section" th:if="${reaction.representative_quote}">
        <h3><span class="sec-icon">💬</span> 대표 발언</h3>
        <div class="quote-block" th:text="${reaction.representative_quote}"></div>
    </div>

    <!-- ③ 첫인상 -->
    <div class="section" th:if="${reaction.first_impression}">
        <h3><span class="sec-icon">👁</span> 첫인상</h3>
        <p th:text="${reaction.first_impression}"></p>
    </div>

    <!-- ④ 전체 반응 -->
    <div class="section" th:if="${reaction.likely_reaction}">
        <h3><span class="sec-icon">💭</span> 전체 반응</h3>
        <p th:text="${reaction.likely_reaction}"></p>
    </div>

    <!-- ⑤ 마음에 든 점 -->
    <div class="section" th:if="${reaction.positive_points != null and !#lists.isEmpty(reaction.positive_points)}">
        <h3><span class="sec-icon">✅</span> 마음에 든 점</h3>
        <div class="tag-list">
            <span class="tag tag-green" th:each="p : ${reaction.positive_points}" th:text="${p}"></span>
        </div>
    </div>

    <!-- ⑥ 걱정되는 점 -->
    <div class="section" th:if="${reaction.concerns != null and !#lists.isEmpty(reaction.concerns)}">
        <h3><span class="sec-icon">⚠️</span> 걱정되는 점</h3>
        <div class="tag-list">
            <span class="tag tag-red" th:each="c : ${reaction.concerns}" th:text="${c}"></span>
        </div>
    </div>

    <!-- ⑦ 구매를 망설이는 이유 -->
    <div class="section" th:if="${reaction.purchase_barriers != null and !#lists.isEmpty(reaction.purchase_barriers)}">
        <h3><span class="sec-icon">🚧</span> 구매를 망설이는 이유</h3>
        <div class="tag-list">
            <span class="tag tag-amber" th:each="b : ${reaction.purchase_barriers}" th:text="${b}"></span>
        </div>
    </div>

    <!-- ⑧ 부족한 정보 -->
    <div class="section" th:if="${reaction.missing_information != null and !#lists.isEmpty(reaction.missing_information)}">
        <h3><span class="sec-icon">❓</span> 궁금하거나 부족한 정보</h3>
        <div class="tag-list">
            <span class="tag tag-gray" th:each="m : ${reaction.missing_information}" th:text="${m}"></span>
        </div>
    </div>

    <!-- ⑨ 가격에 대한 생각 -->
    <div class="section" th:if="${reaction.price_reaction}">
        <h3><span class="sec-icon">💰</span> 가격에 대한 생각</h3>
        <p th:text="${reaction.price_reaction}"></p>
    </div>

    <!-- ⑩ 신뢰 반응 -->
    <div class="section" th:if="${reaction.trust_review_reaction}">
        <h3><span class="sec-icon">🔒</span> 신뢰를 느끼는 부분과 부족한 부분</h3>
        <p th:text="${reaction.trust_review_reaction}"></p>
    </div>

    <!-- ⑪ 상세페이지 의견 -->
    <div class="section" th:if="${reaction.detail_page_feedback}">
        <h3><span class="sec-icon">📄</span> 상세페이지에 대한 의견</h3>
        <p th:text="${reaction.detail_page_feedback}"></p>
    </div>

    <!-- ⑫ 설득 메시지 -->
    <div class="section" th:if="${reaction.persuasion_messages != null and !#lists.isEmpty(reaction.persuasion_messages)}">
        <h3><span class="sec-icon">🎯</span> 이 고객을 설득할 수 있는 메시지</h3>
        <div class="tag-list">
            <span class="tag tag-blue" th:each="msg : ${reaction.persuasion_messages}" th:text="${msg}"></span>
        </div>
    </div>

    <!-- ⑬ 개선 제안 -->
    <div class="section" th:if="${reaction.recommended_detail_page_fixes != null and !#lists.isEmpty(reaction.recommended_detail_page_fixes)}">
        <h3><span class="sec-icon">🔧</span> 이 고객을 위한 상세페이지 개선 제안</h3>
        <ul class="fix-list">
            <li th:each="f : ${reaction.recommended_detail_page_fixes}" th:text="${f}"></li>
        </ul>
    </div>

</main>
</body>
</html>
