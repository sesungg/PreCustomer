<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 주문 상세</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        .progress-panel { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px; margin: 16px 0; }
        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .progress-header h2 { margin: 0; font-size: 1.1rem; }
        .progress-percent { font-weight: 700; color: #2563eb; }
        .progress-bar-track { width: 100%; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: #2563eb; transition: width 0.5s ease; border-radius: 4px; }
        .progress-bar-fill.complete { background: #047857; }
        .progress-bar-fill.failed { background: #b91c1c; }
        .progress-bar-fill.stopped { background: #6b7280; }
        .progress-step-name { margin-top: 8px; color: #6b7280; font-size: 0.875rem; }
        .progress-error { color: #b91c1c; margin-top: 8px; font-size: 0.875rem; }
        .pipeline-output { max-width: 100%; overflow-x: auto; }
        .pipeline-output pre { font-size: 0.75rem; color: #6b7280; white-space: pre-wrap; word-break: break-all; margin: 4px 0; }
        .text-success { color: #047857; font-weight: 600; }
        .text-danger { color: #b91c1c; font-weight: 600; }
        #generate-btn { transition: opacity 0.2s; }
        #generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
<header class="site-header">
    <a class="brand" href="/admin/orders">Admin</a>
    <a class="header-link" href="/admin/orders">주문 목록</a>
</header>

<main class="page wide">
    <div class="page-title row-title">
        <div>
            <p class="eyebrow">주문 상세</p>
            <h1 th:text="${order.projectName}">프로젝트명</h1>
            <p>
                현재 상태
                <span class="status"
                      th:classappend="${#strings.toLowerCase(order.status.name())}"
                      th:text="${order.status.label}"></span>
            </p>
        </div>
        <div class="actions">
            <form th:action="@{/admin/orders/{id}/paid(id=${order.id})}" method="post">
                <button class="button secondary" type="submit">입금 확인 처리</button>
            </form>
            <button class="button primary" id="generate-btn" th:attr="data-order-id=${order.id}"
                    th:if="${(reportJob == null || (reportJob.status != 'PENDING' && reportJob.status != 'RUNNING' && reportJob.status != 'STOP_REQUESTED')) && (progress == null || progress.status == 'FAILED' || progress.status == 'STOPPED') && !reportExists}"
                    th:text="${progress != null && (progress.status == 'FAILED' || progress.status == 'STOPPED')} ? '리포트 재개' : '리포트 생성'">
                리포트 생성
            </button>
            <button class="button secondary" id="stop-btn" th:attr="data-order-id=${order.id}"
                    th:if="${(progress != null && (progress.status == 'IN_PROGRESS' || progress.status == 'STOP_REQUESTED')) || (reportJob != null && (reportJob.status == 'PENDING' || reportJob.status == 'RUNNING' || reportJob.status == 'STOP_REQUESTED'))}"
                    th:disabled="${(progress != null && progress.status == 'STOP_REQUESTED') || (reportJob != null && reportJob.status == 'STOP_REQUESTED')}"
                    th:text="${(progress != null && progress.status == 'STOP_REQUESTED') || (reportJob != null && reportJob.status == 'STOP_REQUESTED')} ? '중지 요청됨' : '생성 중지'">
                생성 중지
            </button>
            <button class="button danger" id="regenerate-btn" th:attr="data-order-id=${order.id}"
                    th:if="${(reportJob == null || (reportJob.status != 'PENDING' && reportJob.status != 'RUNNING' && reportJob.status != 'STOP_REQUESTED')) && (progress == null || (progress.status != 'IN_PROGRESS' && progress.status != 'STOP_REQUESTED')) && (reportExists || progress != null)}">
                처음부터 다시 생성
            </button>
            <a class="button primary" th:if="${reportExists || (progress != null && progress.status == 'COMPLETED')}"
               th:href="@{/admin/reports/{id}(id=${order.id})}">리포트 보기</a>
            <form th:action="@{/admin/orders/{id}/failed(id=${order.id})}" method="post">
                <button class="button danger" type="submit">실패 처리</button>
            </form>
        </div>
    </div>

    <!-- 진행상황 -->
    <div class="progress-panel" id="progress-panel"
         th:if="${progress != null}"
         th:style="${progress.status == 'COMPLETED' || progress.status == 'FAILED'} ? '' : 'display:block'">
        <div class="progress-header">
            <h2 th:text="${progress.status == 'IN_PROGRESS'} ? '리포트 생성 중' : (${progress.status == 'STOP_REQUESTED'} ? '중지 요청 중' : (${progress.status == 'STOPPED'} ? '리포트 생성 중지' : (${progress.status == 'COMPLETED'} ? '리포트 생성 완료' : (${progress.status == 'FAILED'} ? '리포트 생성 실패' : '대기 중'))))"></h2>
            <span class="progress-percent" th:text="${progress.currentStep} + '/' + ${progress.totalSteps}"></span>
        </div>
        <div class="progress-bar-track">
            <div class="progress-bar-fill"
                 th:classappend="${progress.status == 'COMPLETED'} ? 'complete' : (${progress.status == 'FAILED'} ? 'failed' : (${progress.status == 'STOPPED'} ? 'stopped' : ''))"
                 th:style="'width: ' + (${progress.totalSteps > 0 ? progress.currentStep * 100 / progress.totalSteps : 0}) + '%'"></div>
        </div>
        <p class="progress-step-name" th:text="${progress.currentStepName}"></p>
        <p style="font-size:0.75rem;color:#94a3b8;margin-top:4px" th:if="${progress.stepStartedAt != null && progress.status == 'IN_PROGRESS'}"
           th:text="'경과: ' + ${T(java.time.Duration).between(progress.stepStartedAt, T(java.time.LocalDateTime).now()).toSeconds()} + '초'"></p>
        <p class="progress-error" th:if="${progress.errorMessage != null}" th:text="${progress.errorMessage}"></p>
    </div>

    <!-- 진행상황 없음 (대기용) -->
    <div class="progress-panel" id="progress-panel-pending" style="display:none">
        <div class="progress-header">
            <h2 id="progress-title">리포트 생성 중</h2>
            <span class="progress-percent" id="progress-step-text">0/0</span>
        </div>
        <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progress-bar-fill" style="width:0%"></div>
        </div>
        <p class="progress-step-name" id="progress-step-name"></p>
        <p class="progress-error" id="progress-error" style="display:none"></p>
    </div>

    <div class="detail-grid">
        <section class="panel">
            <h2>신청 정보</h2>
            <dl class="details">
                <dt>신청자 이메일</dt>
                <dd th:text="${order.customerEmail}"></dd>
                <dt>분석 대상 유형</dt>
                <dd th:text="${order.targetType.label}"></dd>
                <dt>리포트 관점</dt>
                <dd th:text="${order.reportPerspective.label}"></dd>
                <dt>페이지 URL</dt>
                <dd><a th:if="${order.pageUrl}" th:href="${order.pageUrl}" th:text="${order.pageUrl}" target="_blank" rel="noreferrer"></a><span th:unless="${order.pageUrl}">미입력</span></dd>
                <dt>가격 정보</dt>
                <dd th:text="${order.priceText ?: '미입력'}"></dd>
                <dt>개인정보 입력 금지 동의</dt>
                <dd th:text="${order.privacyAgreement ? '동의' : '미동의'}"></dd>
            </dl>
        </section>

        <section class="panel">
            <h2>입력 내용</h2>
            <h3>한 줄 소개</h3>
            <p class="preline" th:text="${order.oneLineDescription ?: '미입력'}"></p>
            <h3>상세 설명</h3>
            <p class="preline" th:text="${order.detailDescription ?: '미입력'}"></p>
            <h3>주요 타겟 고객</h3>
            <p class="preline" th:text="${order.targetCustomer ?: '미입력'}"></p>
            <h3>현재 가장 궁금한 점</h3>
            <p class="preline" th:text="${order.mainQuestion ?: '미입력'}"></p>
        </section>
    </div>

    <section class="panel" th:if="${imageFilenames != null && !imageFilenames.isEmpty()}">
        <h2>업로드 이미지</h2>
        <div class="image-gallery">
            <div th:each="filename : ${imageFilenames}" class="image-item">
                <img th:src="@{/uploads/{name}(name=${filename})}"
                     th:alt="${filename}" loading="lazy"
                     style="max-width: 300px; max-height: 300px; object-fit: contain; border: 1px solid #e5e7eb; border-radius: 8px;">
            </div>
        </div>
    </section>
</main>

<script th:inline="javascript">
    (function() {
        var orderId = /*[[${order.id}]]*/ null;
        var generateBtn = document.getElementById('generate-btn');
        var stopBtn = document.getElementById('stop-btn');
        var regenerateBtn = document.getElementById('regenerate-btn');
        var defaultButtonText = generateBtn ? generateBtn.textContent : '리포트 생성';
        var progressPanel = document.getElementById('progress-panel');
        var pendingPanel = document.getElementById('progress-panel-pending');

        if (!orderId) return;

        if (generateBtn) {
            generateBtn.addEventListener('click', function() {
                startPipeline('/admin/orders/' + orderId + '/generate',
                    defaultButtonText.indexOf('재개') >= 0 ? '재개 중...' : '생성 중...', generateBtn);
            });
        }

        if (regenerateBtn) {
            regenerateBtn.addEventListener('click', function() {
                if (!confirm('기존 리포트 산출물을 삭제하고 처음부터 다시 생성할까요?')) return;
                startPipeline('/admin/orders/' + orderId + '/regenerate', '재생성 중...', regenerateBtn);
            });
        }

        if (stopBtn) {
            stopBtn.addEventListener('click', function() {
                stopBtn.disabled = true;
                stopBtn.textContent = '중지 요청됨';
                fetch('/admin/orders/' + orderId + '/stop', { method: 'POST' })
                    .then(function(r) { return r.json(); })
                    .then(function() { startPolling(); })
                    .catch(function() {
                        stopBtn.disabled = false;
                        stopBtn.textContent = '생성 중지';
                    });
            });
        }

        function startPipeline(url, buttonText, trigger) {
            if (stopBtn) stopBtn.style.display = 'inline-block';
            if (regenerateBtn) regenerateBtn.disabled = true;
            if (!trigger) return;
            var originalText = trigger.textContent;
            trigger.disabled = true;
            trigger.textContent = buttonText;
            fetch(url, { method: 'POST' })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.status === 'already_running') {
                        startPolling();
                        return;
                    }
                    if (pendingPanel) pendingPanel.style.display = 'block';
                    if (progressPanel) progressPanel.style.display = 'none';
                    startPolling();
                })
                .catch(function() {
                    trigger.disabled = false;
                    trigger.textContent = originalText;
                    if (regenerateBtn) regenerateBtn.disabled = false;
                });
        }

        function disableStartButtons() {
            if (generateBtn) generateBtn.disabled = true;
            if (regenerateBtn) regenerateBtn.disabled = true;
        }

        function startPolling() {
            var poll = setInterval(function() {
                fetch('/admin/orders/' + orderId + '/progress')
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        var panel = pendingPanel || progressPanel;
                        var title = document.getElementById('progress-title');
                        var stepText = document.getElementById('progress-step-text');
                        var bar = document.getElementById('progress-bar-fill');
                        var stepName = document.getElementById('progress-step-name');
                        var err = document.getElementById('progress-error');

                        if (panel) panel.style.display = 'block';
                        if (stepText) stepText.textContent = data.currentStep + '/' + data.totalSteps;
                        if (stepName) {
                            stepName.textContent = data.currentStepName || '';
                            if (data.elapsedSeconds > 0) {
                                var mins = Math.floor(data.elapsedSeconds / 60);
                                var secs = data.elapsedSeconds % 60;
                                stepName.textContent += '   (' + (mins > 0 ? mins + '분 ' : '') + secs + '초 경과)';
                            }
                        }

                        var pct = data.totalSteps > 0 ? (data.currentStep * 100 / data.totalSteps) : 0;
                        if (bar) {
                            bar.style.width = pct + '%';
                            bar.className = 'progress-bar-fill';
                            if (data.status === 'COMPLETED') bar.className += ' complete';
                            if (data.status === 'FAILED') bar.className += ' failed';
                            if (data.status === 'STOPPED') bar.className += ' stopped';
                        }
                        if (title) {
                            if (data.status === 'COMPLETED') title.textContent = '리포트 생성 완료';
                            else if (data.status === 'FAILED') title.textContent = '리포트 생성 실패';
                            else if (data.status === 'PENDING') title.textContent = '작업 대기 중';
                            else if (data.status === 'STOP_REQUESTED') title.textContent = '중지 요청 중';
                            else if (data.status === 'STOPPED') title.textContent = '리포트 생성 중지';
                            else title.textContent = '리포트 생성 중';
                        }
                        if (err) {
                            err.style.display = data.errorMessage ? 'block' : 'none';
                            err.textContent = data.errorMessage || '';
                        }

                        if (data.completed) {
                            clearInterval(poll);
                            if (generateBtn) generateBtn.style.display = 'none';
                            if (stopBtn) stopBtn.style.display = 'none';
                            setTimeout(function() { location.reload(); }, 1500);
                        } else {
                            disableStartButtons();
                            if (stopBtn) {
                                stopBtn.style.display = 'inline-block';
                                stopBtn.disabled = data.status === 'STOP_REQUESTED';
                                stopBtn.textContent = data.status === 'STOP_REQUESTED' ? '중지 요청됨' : '생성 중지';
                            }
                        }
                    });
            }, 2000);
        }

        // If already in progress on page load, start polling
        var existingProgress = document.querySelector('#progress-panel') !== null;
        var existingStatus = /*[[${progress != null ? progress.status : ''}]]*/ '';
        if (existingProgress && (existingStatus === 'IN_PROGRESS' || existingStatus === 'STOP_REQUESTED')) {
            if (generateBtn) {
                generateBtn.disabled = true;
                generateBtn.textContent = existingStatus === 'STOP_REQUESTED' ? '중지 요청됨' : '생성 중...';
            }
            if (regenerateBtn) regenerateBtn.disabled = true;
            startPolling();
        }
    })();
</script>
</body>
</html>
