spring:
  application:
    name: precustomer-api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: public-web
          uri: ${PUBLIC_WEB_URI:http://localhost:8080}
          predicates:
            - Path=/,/orders,/orders/**,/account,/account/**,/events/log,/login,/signup,/logout,/css/**,/js/**,/img/**,/webjars/**,/favicon.ico,/error
        - id: admin-web
          uri: ${ADMIN_WEB_URI:http://localhost:8081}
          predicates:
            - Path=/admin,/admin/**,/api/shopping/naver,/api/shopping/naver/**,/uploads,/uploads/**

server:
  port: ${GATEWAY_PORT:${PORT:8088}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  gateway:
    security:
      admin:
        username: ${GATEWAY_ADMIN_USERNAME:${ADMIN_USERNAME:admin}}
        # Raw password is accepted for local/dev. BCrypt hashes are also supported for deployed environments.
        password: ${GATEWAY_ADMIN_PASSWORD:${ADMIN_PASSWORD:admin}}
      jwt:
        secret: ${GATEWAY_JWT_SECRET:local-jwt-secret-change-me-32bytes-minimum}
        issuer: ${GATEWAY_JWT_ISSUER:precustomer-api-gateway}
        cookie-name: ${GATEWAY_JWT_COOKIE_NAME:PCR_ACCESS_TOKEN}
        access-token-ttl: ${GATEWAY_JWT_ACCESS_TOKEN_TTL:PT2H}
        secure-cookie: ${GATEWAY_JWT_SECURE_COOKIE:false}
      passport:
        secret: ${GATEWAY_PASSPORT_SECRET:local-passport-secret-change-me-32bytes!}
        header-name: ${GATEWAY_PASSPORT_HEADER:X-PreCustomer-Passport}
        ttl: ${GATEWAY_PASSPORT_TTL:PT5M}
