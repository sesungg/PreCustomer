plugins {
    id 'org.springframework.boot'
}

apply from: rootProject.file('gradle/precustomer-service-app.gradle')

springBoot {
    mainClass = 'com.example.personareport.ReportWorkerApplication'
}

bootJar {
    archiveBaseName = 'precustomer-report-worker'
}

tasks.named('bootRun') {
    enabled = false
    classpath = files()
}
