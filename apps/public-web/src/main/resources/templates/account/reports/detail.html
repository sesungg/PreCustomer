<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${order.projectName} + ' | 최종 리포트'">최종 리포트</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <th:block th:replace="~{fragments/analytics :: head}"></th:block>
</head>
<body>
<header class="site-header">
    <a class="brand" href="/">PreCustomerReport</a>
    <nav class="header-nav">
        <a class="header-link" href="/account/reports">내 리포트</a>
        <a class="header-link" href="/orders/new">리포트 신청하기</a>
        <form th:action="@{/logout}" method="post" class="inline-form">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="link-button" type="submit">로그아웃</button>
        </form>
    </nav>
</header>

<main class="page report-page">
    <section class="report-header-panel">
        <div>
            <p class="eyebrow" th:text="${order.targetType.label}">상세페이지</p>
            <h1 th:text="${order.projectName}">프로젝트명</h1>
            <p class="sublead" th:text="${reportReady} ? '최종 리포트가 완성되었습니다.' : '아직 최종 리포트가 생성 중입니다.'">
                리포트 상태
            </p>
        </div>
        <div class="report-header-actions">
            <button class="button secondary" type="button" onclick="window.print()" th:if="${reportReady}"
                    data-analytics-event="final_report_print_clicked" data-analytics-category="report_detail"
                    th:attr="data-analytics-report-order-id=${order.id}">인쇄</button>
            <a class="button secondary" href="/account/reports" data-analytics-event="report_list_clicked" data-analytics-category="report_detail">목록으로</a>
        </div>
    </section>

    <section class="waiting-panel" th:unless="${reportReady}">
        <h2>리포트 생성이 진행 중입니다</h2>
        <p>
            현재 상태는 <strong th:text="${order.status.label}">생성 중</strong>입니다.
            최종 리포트가 생성되면 이 화면에서 바로 확인할 수 있습니다.
        </p>
        <a class="button primary" href="/account/reports" data-analytics-event="report_list_clicked" data-analytics-category="report_waiting">내 리포트로 돌아가기</a>
    </section>

    <section th:if="${reportReady}">
        <div class="score-grid">
            <div class="score-tile">
                <span>구매 의향</span>
                <strong th:text="${purchaseIntentScore}">0</strong>
                <div><i th:style="'width:' + ${purchaseIntentScore} + '%'"></i></div>
            </div>
            <div class="score-tile">
                <span>고객 적합도</span>
                <strong th:text="${targetFitScore}">0</strong>
                <div><i th:style="'width:' + ${targetFitScore} + '%'"></i></div>
            </div>
            <div class="score-tile">
                <span>가격 수용도</span>
                <strong th:text="${priceScore}">0</strong>
                <div><i th:style="'width:' + ${priceScore} + '%'"></i></div>
            </div>
            <div class="score-tile">
                <span>신뢰도</span>
                <strong th:text="${trustScore}">0</strong>
                <div><i th:style="'width:' + ${trustScore} + '%'"></i></div>
            </div>
            <div class="score-tile">
                <span>설명 이해도</span>
                <strong th:text="${clarityScore}">0</strong>
                <div><i th:style="'width:' + ${clarityScore} + '%'"></i></div>
            </div>
        </div>

        <dl class="account-report-meta detail">
            <div>
                <dt>신청일</dt>
                <dd th:text="${summary.orderedAt}">-</dd>
            </div>
            <div>
                <dt>생성일</dt>
                <dd th:text="${reportDate}">-</dd>
            </div>
            <div>
                <dt>응답 수</dt>
                <dd th:text="${report.response_count} ?: '-'">-</dd>
            </div>
            <div>
                <dt>모델</dt>
                <dd th:text="${report.model_name} ?: '-'">-</dd>
            </div>
        </dl>

        <section class="report-section public-report-section" th:each="section : ${sections}">
            <h2 th:text="${section.title}">섹션</h2>
            <p th:text="${section.content}">내용</p>
        </section>

        <section class="report-section public-report-section" th:if="${#lists.isEmpty(sections)}">
            <h2>리포트 원문</h2>
            <p th:text="${report.report_markdown} ?: '표시할 리포트 본문이 없습니다.'">리포트 원문</p>
        </section>
    </section>
</main>
</body>
</html>
