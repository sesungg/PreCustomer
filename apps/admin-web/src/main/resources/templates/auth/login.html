<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="site-header">
    <a class="brand" href="/admin/orders">Admin</a>
</header>

<main class="page narrow auth-page">
    <div class="page-title">
        <p class="eyebrow">관리자 로그인</p>
        <h1>관리자 계정으로 계속하기</h1>
    </div>
    <form class="form auth-form" th:action="@{/admin/login}" method="post">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="field" th:if="${param.error}">
            <p class="field-error">아이디 또는 비밀번호를 확인해 주세요.</p>
        </div>
        <div class="field" th:if="${param.logout}">
            <p class="success-text">로그아웃되었습니다.</p>
        </div>
        <div class="field">
            <label for="username">아이디</label>
            <input id="username" name="username" type="text" autocomplete="username" required>
        </div>
        <div class="field">
            <label for="password">비밀번호</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="button primary full" type="submit">로그인</button>
    </form>
</main>
</body>
</html>
