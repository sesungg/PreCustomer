<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리포트 신청하기</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="site-header">
    <a class="brand" href="/">CustomerPreview</a>
    <a class="header-link" href="/">서비스 소개</a>
</header>

<main class="page narrow">
    <div class="page-title">
        <p class="eyebrow">베타 리포트 9,900원</p>
        <h1>리포트 신청하기</h1>
        <p>아이디어나 판매 문구를 입력하면 AI 기반 가상고객 시뮬레이션 리포트 생성에 필요한 정보를 접수합니다.</p>
    </div>

    <div class="warning-box">
        <strong>입력 금지 안내</strong>
        <p>개인정보, 고객 DB, 매출자료, 계약서, 내부 기획자료, 병원·금융·법률 등 민감정보는 입력하지 마세요.</p>
    </div>

    <form class="form" th:action="@{/orders}" th:object="${orderRequest}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="field">
            <label for="customerEmail">신청자 이메일</label>
            <input id="customerEmail" type="email" th:field="*{customerEmail}" placeholder="name@example.com">
            <p class="field-error" th:errors="*{customerEmail}"></p>
        </div>

        <div class="field">
            <label for="projectName">프로젝트/상품/서비스명</label>
            <input id="projectName" type="text" th:field="*{projectName}" placeholder="예: 미리고객 베타 리포트">
            <p class="field-error" th:errors="*{projectName}"></p>
        </div>

        <div class="field">
            <label for="targetType">분석 대상 유형</label>
            <select id="targetType" th:field="*{targetType}">
                <option value="">선택해 주세요</option>
                <option th:each="type : ${targetTypes}" th:value="${type}" th:text="${type.label}"></option>
            </select>
            <p class="field-error" th:errors="*{targetType}"></p>
        </div>

        <div class="field">
            <label for="oneLineDescription">한 줄 소개</label>
            <input id="oneLineDescription" type="text" th:field="*{oneLineDescription}" placeholder="고객에게 보여줄 핵심 문장을 적어 주세요.">
        </div>

        <div class="field">
            <label for="detailDescription">상세 설명</label>
            <textarea id="detailDescription" rows="8" th:field="*{detailDescription}" placeholder="아이디어, 서비스, 판매페이지, 공모전 기획안의 핵심 내용을 입력해 주세요."></textarea>
            <p class="field-error" th:if="${#fields.hasErrors('descriptionPresent')}" th:errors="*{descriptionPresent}"></p>
        </div>

        <div class="field">
            <label for="pageUrl">페이지 URL</label>
            <input id="pageUrl" type="url" th:field="*{pageUrl}" placeholder="https://example.com">
        </div>

        <div class="field">
            <label for="images">상세페이지 전체 캡처 이미지</label>
            <div class="image-upload-zone" id="imageUploadZone" style="border:2px dashed #d1d5db;border-radius:10px;padding:24px;text-align:center;cursor:pointer;background:#f9fafb;transition:border-color 0.2s">
                <p style="margin:0 0 4px;font-size:0.9rem;color:#6b7280">스마트스토어/쿠팡은 상세페이지 전체 화면을 캡처해서 올려 주세요</p>
                <p style="margin:0;font-size:0.78rem;color:#9ca3af">PNG, JPG, WebP를 선택하면 업로드 전에 WebP로 자동 압축됩니다 · 최대 10장</p>
                <p id="fileCount" style="margin:8px 0 0;font-size:0.85rem;font-weight:600;color:#2563eb;display:none"></p>
                <p id="convertStatus" style="margin:6px 0 0;font-size:0.78rem;color:#64748b;display:none"></p>
                <div id="imagePreview" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;justify-content:center"></div>
            </div>
            <input id="images" type="file" name="images" multiple
                   accept="image/webp,image/png,image/jpeg"
                   style="position:absolute;opacity:0;width:0;height:0;overflow:hidden">
            <p class="field-error" th:if="${uploadError != null}" th:text="${uploadError}"></p>
        </div>

        <script>
        (function(){
            var zone=document.getElementById('imageUploadZone');
            var input=document.getElementById('images');
            var form=document.querySelector('form.form');
            var submitButton=form ? form.querySelector('button[type="submit"]') : null;
            var convertStatus=document.getElementById('convertStatus');
            var converting=false;
            var conversionPromise=Promise.resolve();
            var maxWidth=1600;
            var maxPixels=24000000;
            var webpQuality=0.82;

            zone.addEventListener('click',function(){ if(!converting) input.click(); });
            zone.addEventListener('dragover',function(e){e.preventDefault();zone.style.borderColor='#2563eb';});
            zone.addEventListener('dragleave',function(){zone.style.borderColor='#d1d5db';});
            zone.addEventListener('drop',function(e){
                e.preventDefault();
                zone.style.borderColor='#d1d5db';
                conversionPromise=convertAndSetFiles(e.dataTransfer.files);
            });
            input.addEventListener('change',function(){conversionPromise=convertAndSetFiles(input.files);});
            if(form){
                form.addEventListener('submit',function(e){
                    if(!converting) return;
                    e.preventDefault();
                    conversionPromise.then(function(){ HTMLFormElement.prototype.submit.call(form); });
                });
            }

            async function convertAndSetFiles(fileList){
                var files=Array.prototype.slice.call(fileList || []).filter(Boolean);
                if(files.length===0){showFiles();return;}
                setConverting(true,'이미지를 WebP로 압축하는 중입니다...');
                try{
                    var converted=[];
                    for(var i=0;i<files.length;i++){
                        setConverting(true,'이미지를 WebP로 압축하는 중입니다... ('+(i+1)+'/'+files.length+')');
                        converted.push(await toWebpFile(files[i]));
                    }
                    setInputFiles(converted);
                    showFiles();
                    var saved=files.reduce(function(sum,f,idx){return sum+Math.max(0,f.size-(converted[idx]?converted[idx].size:f.size));},0);
                    setStatus('WebP 변환 완료' + (saved>0 ? ' · 약 '+formatBytes(saved)+' 절감' : ''), false);
                }catch(err){
                    setStatus('WebP 변환에 실패해 원본 이미지로 업로드합니다.', false);
                    setInputFiles(files);
                    showFiles();
                }finally{
                    setConverting(false);
                }
            }

            function toWebpFile(file){
                if(!file || !file.type || file.type.indexOf('image/')!==0) return Promise.resolve(file);
                return loadImage(file).then(function(img){
                    var pixelScale=Math.sqrt(maxPixels / Math.max(1, img.width * img.height));
                    var scale=Math.min(1, maxWidth / img.width, pixelScale);
                    var canvas=document.createElement('canvas');
                    canvas.width=Math.max(1, Math.round(img.width * scale));
                    canvas.height=Math.max(1, Math.round(img.height * scale));
                    var ctx=canvas.getContext('2d');
                    ctx.drawImage(img,0,0,canvas.width,canvas.height);
                    return new Promise(function(resolve){
                        canvas.toBlob(function(blob){
                            URL.revokeObjectURL(img.src);
                            if(!blob){ resolve(file); return; }
                            var name=(file.name || 'detail-page').replace(/\.[^.]+$/,'')+'.webp';
                            resolve(new File([blob], name, {type:'image/webp', lastModified:Date.now()}));
                        }, 'image/webp', webpQuality);
                    });
                }).catch(function(){ return file; });
            }

            function loadImage(file){
                return new Promise(function(resolve,reject){
                    var img=new Image();
                    img.onload=function(){resolve(img);};
                    img.onerror=reject;
                    img.src=URL.createObjectURL(file);
                });
            }

            function setInputFiles(files){
                if(typeof DataTransfer==='undefined') return;
                var dt=new DataTransfer();
                files.forEach(function(file){dt.items.add(file);});
                input.files=dt.files;
            }

            function showFiles(){
                var count=input.files.length,fc=document.getElementById('fileCount'),pv=document.getElementById('imagePreview');
                if(count>0){fc.textContent=count+'개 파일 선택됨';fc.style.display='block';}else{fc.style.display='none';}
                pv.innerHTML='';
                for(var i=0;i<Math.min(count,5);i++){
                    var r=new FileReader();
                    r.onload=(function(f){return function(e){
                        var img=document.createElement('img');
                        img.src=e.target.result;
                        img.title=f.name+' · '+formatBytes(f.size);
                        img.style.cssText='width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid #e5e7eb';
                        pv.appendChild(img);
                    };})(input.files[i]);
                    r.readAsDataURL(input.files[i]);
                }
                if(count>5){
                    var more=document.createElement('span');
                    more.textContent='+'+(count-5)+'장';
                    more.style.cssText='display:flex;align-items:center;justify-content:center;width:80px;height:80px;background:#e5e7eb;border-radius:6px;font-size:0.85rem;font-weight:600;color:#6b7280';
                    pv.appendChild(more);
                }
            }

            function setConverting(active,message){
                converting=active;
                if(submitButton) submitButton.disabled=active;
                if(message) setStatus(message,true);
            }

            function setStatus(message,visible){
                if(!convertStatus) return;
                convertStatus.textContent=message || '';
                convertStatus.style.display=(visible || message) ? 'block' : 'none';
            }

            function formatBytes(bytes){
                if(bytes<1024) return bytes+'B';
                if(bytes<1024*1024) return Math.round(bytes/1024)+'KB';
                return (bytes/1024/1024).toFixed(1)+'MB';
            }
        })();
        </script>

        <div class="field">
            <label for="priceText">가격 정보</label>
            <input id="priceText" type="text" th:field="*{priceText}" placeholder="예: 월 19,000원, 1회 9,900원">
        </div>

        <div class="field">
            <label for="targetCustomer">주요 타겟 고객</label>
            <textarea id="targetCustomer" rows="4" th:field="*{targetCustomer}" placeholder="예: 초기 창업자, 스마트스토어 셀러, 공모전 참가자"></textarea>
        </div>

        <div class="field">
            <label for="mainQuestion">현재 가장 궁금한 점</label>
            <textarea id="mainQuestion" rows="4" th:field="*{mainQuestion}" placeholder="예: 가격이 부담스럽게 느껴질지, 문구가 신뢰를 줄지 궁금합니다."></textarea>
        </div>

        <div class="field">
            <label for="reportPerspective">원하는 리포트 관점</label>
            <select id="reportPerspective" th:field="*{reportPerspective}">
                <option value="">선택해 주세요</option>
                <option th:each="perspective : ${reportPerspectives}" th:value="${perspective}" th:text="${perspective.label}"></option>
            </select>
            <p class="field-error" th:errors="*{reportPerspective}"></p>
        </div>

        <label class="checkbox">
            <input type="checkbox" th:field="*{privacyAgreement}">
            <span>개인정보, 고객 DB, 매출자료, 계약서, 내부자료 및 민감정보를 입력하지 않는다는 안내를 확인했습니다.</span>
        </label>
        <p class="field-error" th:errors="*{privacyAgreement}"></p>

        <button class="button primary full" type="submit">신청 완료하기</button>
    </form>
</main>
</body>
</html>
