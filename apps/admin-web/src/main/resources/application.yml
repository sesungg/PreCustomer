spring:
  application:
    name: precustomer
  cloud:
    openfeign:
      client:
        config:
          deepseek:
            connectTimeout: 10000
            readTimeout: 180000
  profiles:
    default: local
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
  session:
    store-type: ${SESSION_STORE_TYPE:redis}
    timeout: ${SESSION_TIMEOUT:2h}
    redis:
      namespace: ${SESSION_REDIS_NAMESPACE:precustomer:session}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    mail:
      enabled: ${MAIL_HEALTH_ENABLED:${REPORT_DELIVERY_MAIL_ENABLED:false}}
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

app:
  web:
    public-enabled: ${APP_WEB_PUBLIC_ENABLED:false}
    admin-enabled: ${APP_WEB_ADMIN_ENABLED:true}
  upload:
    dir: ./uploads
    allowed-types: image/webp,image/png,image/jpeg
  persona:
    import-enabled: false
    sample-import-enabled: false
    import-path: ./data/personas.full.jsonl
    import-batch-size: 3000
    import-source: NEMOTRON
  pipeline:
    scripts-dir: ${PIPELINE_SCRIPTS_DIR:./scripts/pipeline}
    python-bin: python3
    db-host: localhost
    db-port: 5432
    db-name: precustomer
    db-user: postgres
    db-password: postgres
    persona-candidate-limit: ${REPORT_PERSONA_CANDIDATE_LIMIT:50000}
    reaction-concurrency: ${REPORT_REACTION_CONCURRENCY:3}
    stale-timeout-minutes: ${REPORT_PIPELINE_STALE_TIMEOUT_MINUTES:60}
    worker-enabled: ${REPORT_PIPELINE_WORKER_ENABLED:false}
    worker-poll-ms: ${REPORT_PIPELINE_WORKER_POLL_MS:3000}
    worker-initial-delay-ms: ${REPORT_PIPELINE_WORKER_INITIAL_DELAY_MS:0}
    worker-lease-minutes: ${REPORT_PIPELINE_WORKER_LEASE_MINUTES:240}
    retry-base-delay-seconds: ${REPORT_PIPELINE_RETRY_BASE_DELAY_SECONDS:30}
    retry-max-delay-seconds: ${REPORT_PIPELINE_RETRY_MAX_DELAY_SECONDS:300}
    selected-count: ${REPORT_SELECTED_COUNT:30}  # 운영 시 100으로 변경 (또는 환경변수로 주입)
    gemini-api-key: ${GEMINI_API_KEY:}
  deepseek:
    base-url: https://api.deepseek.com
    model: deepseek-v4-flash
    target-profile-model: ${DEEPSEEK_TARGET_PROFILE_MODEL:${app.deepseek.model}}
    reaction-model: ${DEEPSEEK_REACTION_MODEL:${app.deepseek.model}}
    final-report-model: ${DEEPSEEK_FINAL_REPORT_MODEL:${app.deepseek.model}}
    api-key: ${DEEPSEEK_API_KEY:}
    temperature: 0.4
    max-tokens: 6000
  security:
    admin:
      username: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin}
  gateway:
    passport:
      enabled: ${GATEWAY_PASSPORT_ENABLED:true}
      secret: ${GATEWAY_PASSPORT_SECRET:local-passport-secret-change-me-32bytes!}
      header-name: ${GATEWAY_PASSPORT_HEADER:X-PreCustomer-Passport}
  delivery:
    mail:
      enabled: ${REPORT_DELIVERY_MAIL_ENABLED:false}
      from: ${REPORT_DELIVERY_MAIL_FROM:no-reply@localhost}
      base-url: ${REPORT_DELIVERY_BASE_URL:http://localhost:8080}
  events:
    kafka:
      enabled: ${APP_EVENTS_KAFKA_ENABLED:false}
      topics:
        report-job-events: ${REPORT_JOB_EVENTS_TOPIC:report-job-events}

naver:
  shopping:
    client-id: ${NAVER_SHOPPING_CLIENT_ID:}
    client-secret: ${NAVER_SHOPPING_CLIENT_SECRET:}
    base-url: https://openapi.naver.com/v1/search/shop.json
    display-size: 100
    timeout-millis: 5000
    scoring-version: NAVER_SHOPPING_CANDIDATE_V1

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/precustomer}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  thymeleaf:
    cache: false
app:
  web:
    public-enabled: false
    admin-enabled: true
  pipeline:
    worker-enabled: ${REPORT_PIPELINE_WORKER_ENABLED:false}

server:
  port: ${ADMIN_PORT:${PORT:8081}}

---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:precustomer;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  session:
    store-type: none
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  thymeleaf:
    cache: false
app:
  pipeline:
    worker-enabled: false

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/precustomer}
    username: ${DATABASE_USERNAME:precustomer}
    password: ${DATABASE_PASSWORD:change-me}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

server:
  port: ${ADMIN_PORT:${PORT:8081}}

---
spring:
  config:
    activate:
      on-profile: admin-web
  application:
    name: precustomer-admin-web
  main:
    web-application-type: servlet
app:
  web:
    public-enabled: ${APP_WEB_PUBLIC_ENABLED:false}
    admin-enabled: ${APP_WEB_ADMIN_ENABLED:true}
  pipeline:
    worker-enabled: ${REPORT_PIPELINE_WORKER_ENABLED:false}
server:
  port: ${ADMIN_PORT:8081}
