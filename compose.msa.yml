services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: precustomer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d precustomer"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_INTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 12

  public-web:
    build:
      context: .
      args:
        JAR_FILE: apps/public-web/build/libs/precustomer-public-web-0.0.1-SNAPSHOT.jar
    environment:
      SPRING_PROFILES_ACTIVE: prod,public-web
      DATABASE_URL: jdbc:postgresql://postgres:5432/precustomer
      DATABASE_USERNAME: ${PUBLIC_DB_USERNAME:-precustomer_public_web}
      DATABASE_PASSWORD: ${PUBLIC_DB_PASSWORD:-public-local}
      PUBLIC_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_EVENTS_KAFKA_ENABLED: ${APP_EVENTS_KAFKA_ENABLED:-true}
      REPORT_DELIVERY_BASE_URL: ${REPORT_DELIVERY_BASE_URL:-http://localhost:8088}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  admin-web:
    build:
      context: .
      args:
        JAR_FILE: apps/admin-web/build/libs/precustomer-admin-web-0.0.1-SNAPSHOT.jar
    environment:
      SPRING_PROFILES_ACTIVE: prod,admin-web
      DATABASE_URL: jdbc:postgresql://postgres:5432/precustomer
      DATABASE_USERNAME: ${ADMIN_DB_USERNAME:-precustomer_admin_web}
      DATABASE_PASSWORD: ${ADMIN_DB_PASSWORD:-admin-local}
      ADMIN_PORT: 8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-before-prod}
      GATEWAY_PASSPORT_SECRET: ${GATEWAY_PASSPORT_SECRET:-local-passport-secret-change-me-32bytes!}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health/readiness >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  report-worker:
    build:
      context: .
      args:
        JAR_FILE: apps/report-worker/build/libs/precustomer-report-worker-0.0.1-SNAPSHOT.jar
    environment:
      SPRING_PROFILES_ACTIVE: prod,worker
      DATABASE_URL: jdbc:postgresql://postgres:5432/precustomer
      DATABASE_USERNAME: ${WORKER_DB_USERNAME:-precustomer_report_worker}
      DATABASE_PASSWORD: ${WORKER_DB_PASSWORD:-worker-local}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      NAVER_SHOPPING_CLIENT_ID: ${NAVER_SHOPPING_CLIENT_ID:-}
      NAVER_SHOPPING_CLIENT_SECRET: ${NAVER_SHOPPING_CLIENT_SECRET:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_EVENTS_KAFKA_ENABLED: ${APP_EVENTS_KAFKA_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  gateway:
    build:
      context: .
      args:
        JAR_FILE: apps/api-gateway/build/libs/precustomer-api-gateway-0.0.1-SNAPSHOT.jar
    environment:
      SPRING_PROFILES_ACTIVE: prod,gateway
      GATEWAY_PORT: 8088
      PUBLIC_WEB_URI: http://public-web:8080
      ADMIN_WEB_URI: http://admin-web:8081
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-before-prod}
      GATEWAY_JWT_SECRET: ${GATEWAY_JWT_SECRET:-local-jwt-secret-change-me-32bytes-minimum}
      GATEWAY_PASSPORT_SECRET: ${GATEWAY_PASSPORT_SECRET:-local-passport-secret-change-me-32bytes!}
      GATEWAY_JWT_SECURE_COOKIE: ${GATEWAY_JWT_SECURE_COOKIE:-false}
    ports:
      - "8088:8088"
    depends_on:
      public-web:
        condition: service_healthy
      admin-web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8088/actuator/health/readiness >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
